*{margin:0;padding:0;box-sizing:border-box}
body{background:#070d1a;color:#c8d8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;user-select:none}
canvas{display:block;cursor:crosshair}
#info{position:fixed;bottom:20px;left:20px;width:300px;background:rgba(7,13,26,.92);border:1px solid #1e3a5f;border-radius:8px;padding:14px;backdrop-filter:blur(8px)}

#dtag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 8px;border-radius:4px;margin-bottom:8px}
#info p{font-size:12px;line-height:1.55;color:#7a8faa}
#info .cn{margin-top:8px;font-size:11px;color:#3a5878}
#info .res{margin-top:8px;font-size:11px}
#info .res a{color:#4a8ab0;text-decoration:none;display:block;line-height:1.8}
#info .res a:hover{color:#7ab8e0}
#info .pre{margin-top:5px;font-size:10px;color:#2a5070}
#hint{position:fixed;top:16px;right:16px;background:rgba(7,13,26,.85);border:1px solid #1a3050;border-radius:8px;padding:10px 14px;font-size:11px;color:#3a5878;line-height:1.9}
#hint kbd{background:#0d1f3a;border:1px solid #1e3a5f;border-radius:3px;padding:1px 5px;font-size:10px;color:#4a7090}
#bc{position:fixed;top:16px;left:20px;font-size:11px;color:#2a4060;max-width:60vw}
#bc b{color:#5a90c0}
#legend{position:fixed;bottom:20px;right:16px;background:rgba(7,13,26,.85);border:1px solid #1a3050;border-radius:8px;padding:10px 14px;font-size:11px;line-height:2}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
#zoomlabel{position:fixed;top:52px;right:16px;font-size:10px;color:#2a4868;text-align:right;pointer-events:none}
#vfx{position:fixed;top:50%;right:16px;transform:translateY(-50%);background:rgba(7,13,26,.85);border:1px solid #1a3050;border-radius:8px;padding:10px 14px;font-size:11px;color:#3a5878;line-height:1.8}
#vfx .vfx-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
#vfx .vfx-label{width:64px;color:#3a5878}
#vfx input[type=range]{width:90px;accent-color:#2a6090;cursor:pointer}
#vfx .vfx-val{width:34px;text-align:right;color:#4a7090;font-size:10px}
#vfx .vfx-title{font-size:10px;color:#2a4060;letter-spacing:.6px;margin-bottom:6px;text-align:center}
</style>

const ZOOM_FADE=0.28; // units of zoom over which node fades/grows in

// Base radius per level (fully zoomed in to that level)
const BASE_R=[0, 68, 50, 36, 24]; // index = level

function zoomAlpha(level, zoom){
  const thr=ZOOM_THR[level-1];
  if(zoom<thr) return 0;
  return Math.min(1,(zoom-thr)/ZOOM_FADE);
}

// Edge lookup for weight/type
const EMAP={};
DATA.edges.forEach(e=>{
  EMAP[e.from+'|'+e.to]=e;
  EMAP[e.to+'|'+e.from]=e;
});
function edgeInfo(a,b){ return EMAP[a+'|'+b]||{type:'related',weight:1}; }

// ── PHYSICS ───────────────────────────────────────────────
const phys={};
DATA.nodes.forEach(n=>{
  const s=n.seed||{x:0,y:0};
  phys[n.id]={x:s.x+(Math.random()-.5)*120, y:s.y+(Math.random()-.5)*120, vx:0, vy:0};
});

// ── BFS DISTANCE ──────────────────────────────────────────
function bfsDist(from){
  const d={[from]:0};const q=[from];
  while(q.length){const id=q.shift();ADJ[id].forEach(nb=>{if(d[nb]==null){d[nb]=d[id]+1;q.push(nb);}});}
  return d;
}

// ── FORCE SIM ─────────────────────────────────────────────
const REPULSE=20000, ATTRACT=0.016, CLUSTER=0.004, BOUND=900;

function simStep(dist){
  const ids=Object.keys(phys);
  ids.forEach(id=>{phys[id].fx=0;phys[id].fy=0;});

  // Repulsion
  for(let i=0;i<ids.length;i++){
    for(let j=i+1;j<ids.length;j++){
      const a=phys[ids[i]],b=phys[ids[j]];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d2=Math.max(dx*dx+dy*dy,400);
      const d=Math.sqrt(d2),f=REPULSE/d2;
      a.fx-=f*dx/d; a.fy-=f*dy/d;
      b.fx+=f*dx/d; b.fy+=f*dy/d;
    }
  }

  // Edge attraction (weighted)
  DATA.edges.forEach(e=>{
    const pa=phys[e.from],pb=phys[e.to];
    if(!pa||!pb) return;
    const dx=pb.x-pa.x,dy=pb.y-pa.y;
    const f=ATTRACT*e.weight;
    pa.fx+=dx*f; pa.fy+=dy*f;
    pb.fx-=dx*f; pb.fy-=dy*f;
  });

  // Cluster gravity
  const SEEDS={mechanical:{x:-520,y:80},electrical:{x:420,y:320},it:{x:380,y:-340},bridge:{x:0,y:0},root:{x:0,y:0},physics:{x:-940,y:-200},aerospace:{x:-340,y:-580},biomedical:{x:800,y:-80},energy:{x:80,y:720},mathematics:{x:80,y:-720}};
  ids.forEach(id=>{
    const s=SEEDS[NM[id].domain]||{x:0,y:0};
    const p=phys[id];
    p.fx+=(s.x-p.x)*CLUSTER;
    p.fy+=(s.y-p.y)*CLUSTER;
  });

  // Integrate
  ids.forEach(id=>{
    const p=phys[id];
    const d=dist[id]??99;
    const damp=d<=1?0.05:d<=2?0.25:0.86;
    p.vx=(p.vx+p.fx)*damp;
    p.vy=(p.vy+p.fy)*damp;
    p.x+=p.vx; p.y+=p.vy;
    if(Math.abs(p.x)>BOUND) p.vx-=(p.x>0?1:-1)*2;
    if(Math.abs(p.y)>BOUND) p.vy-=(p.y>0?1:-1)*2;
  });
}

// ── DRAW HELPERS ──────────────────────────────────────────
function w2s(wx,wy){
  return[(wx-camX)*zoom+W/2+panOffX,(wy-camY)*zoom+H/2+panOffY];
}

function drawGrid(){
  const gs=80*zoom;
  const ox=((W/2+panOffX)%gs+gs)%gs, oy=((H/2+panOffY)%gs+gs)%gs;
  ctx.strokeStyle='#0c1628';ctx.lineWidth=1;
  for(let x=ox-gs;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy-gs;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// Edge dash styles per type
const EDGE_DASH={subtopic:[],related:[4,7],prerequisite:[2,5],bridge:[6,4]};

function drawEdges(){
  DATA.edges.forEach(e=>{
    const da=dist[e.from]??99, db=dist[e.to]??99;
    if(Math.max(da,db)>=3) return;

    // Both nodes must also pass zoom level threshold
    const na=NM[e.from],nb2=NM[e.to];
    const za=zoomAlpha(na.level,zoom), zb=zoomAlpha(nb2.level,zoom);
    if(za<=0||zb<=0) return;

    const distAlpha=Math.max(da,db)===0?0.7:Math.max(da,db)===1?0.45:0.15;
    const alpha=distAlpha*Math.min(za,zb);

    const [x1,y1]=w2s(phys[e.from].x,phys[e.from].y);
    const [x2,y2]=w2s(phys[e.to].x,  phys[e.to].y);

    const dc=DC[na.domain]||DC.root;
    const isBridge=e.type==='bridge';
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=isBridge?'#7030a0':dc.stroke;
    ctx.lineWidth=isBridge?1.5:1.0;
    ctx.setLineDash(EDGE_DASH[e.type]||[]);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.restore();
  });
}

function drawNode(id){
  const d=dist[id]??99;
  if(d>=3) return;
  const n=NM[id];
  const za=zoomAlpha(n.level,zoom);
  if(za<=0) return;

  const p=phys[id];
  const dc=DC[n.domain]||DC.root;
  const isCenter=id===focused;

  // Radius: grows with zoom-alpha, sized by level
  const baseR=(BASE_R[n.level]||50)*orbScale;
  const r=baseR*za*(isCenter?1:d===1?0.95:0.75);

  const distAlpha=d===0?1:d===1?0.92:0.38;
  const alpha=distAlpha*za;

  const [sx,sy]=w2s(p.x,p.y);
  ctx.save();ctx.globalAlpha=alpha;

  // glow for focused
  if(isCenter&&za>0.5){
    const g=ctx.createRadialGradient(sx,sy,r*.5,sx,sy,r+24*za);
    g.addColorStop(0,dc.stroke+'55');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,r+24*za,0,Math.PI*2);ctx.fill();
  }

  // circle
  const gf=ctx.createRadialGradient(sx-r*.3,sy-r*.3,0,sx,sy,r);
  gf.addColorStop(0,dc.fill+'ff');gf.addColorStop(1,dc.fill+'cc');
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
  ctx.fillStyle=gf;ctx.fill();
  ctx.strokeStyle=isCenter?dc.stroke:dc.stroke+(d===1?'cc':'55');
  ctx.lineWidth=isCenter?2.5:d===1?1.6:1.0;
  ctx.setLineDash([]);ctx.stroke();

  // label (only when node is big enough to read)
  if(r>16){
    const lines=n.label.split('\n');
    const fs=Math.max(8,Math.min(isCenter?13:11, r*0.28));
    ctx.font=`${isCenter?600:500} ${fs}px 'Segoe UI',system-ui,sans-serif`;
    ctx.fillStyle=dc.text;ctx.textAlign='center';ctx.textBaseline='middle';
    const lh=fs*1.3,th=lines.length*lh;
    lines.forEach((l,i)=>ctx.fillText(l,sx,sy-th/2+i*lh+lh/2));
  }

  // domain dot
  if(r>20){
    ctx.beginPath();ctx.arc(sx+r-6,sy-r+6,3.5,0,Math.PI*2);
    ctx.fillStyle=dc.stroke;ctx.fill();
  }
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawGrid();
  drawEdges();
  // draw far→near so center is always on top
  [2,1,0].forEach(td=>DATA.nodes.forEach(n=>{if((dist[n.id]??99)===td)drawNode(n.id);}));
  updateHUD();

  // zoom level label
  const lvlNames=['','Overview','Fields','Topics','Details'];
  const activeLvl=zoom>=ZOOM_THR[3]?4:zoom>=ZOOM_THR[2]?3:zoom>=ZOOM_THR[1]?2:1;
  document.getElementById('zoomlabel').textContent=
    `zoom ${zoom.toFixed(2)}× · L${activeLvl}: ${lvlNames[activeLvl]}`;
}

// ── HUD ───────────────────────────────────────────────────
function updateHUD(){
  const n=NM[focused],dc=DC[n.domain];
  document.getElementById('ititle').textContent=n.label.replace('\n',' ');
  const tag=document.getElementById('dtag');
  tag.textContent=DL[n.domain];
  tag.style.cssText=`background:${dc.tag};color:${dc.tagTxt};border:1px solid ${dc.stroke}55;display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;padding:2px 8px;border-radius:4px;margin-bottom:8px`;
  document.getElementById('idesc').textContent=n.desc;
  document.getElementById('icn').textContent=`${ADJ[focused].length} connections · level ${n.level}`;

  // Resources
  const res=n.resources||[];
  const resEl=document.getElementById('ires');
  resEl.innerHTML=res.length?res.map(r=>`<a href="${r.url}" target="_blank">↗ ${r.label}</a>`).join(''):'';

  // Prereqs
  const pre=n.prereqs||[];
  const preEl=document.getElementById('ipre');
  preEl.textContent=pre.length?'Prereqs: '+pre.map(id=>NM[id]?.label.replace('\n',' ')).join(', '):'';

  // Breadcrumb
  const trail=[...history,focused];
  document.getElementById('bc').innerHTML=
    trail.map(id=>`<b>${NM[id]?.label.replace('\n',' ')}</b>`)
         .join(' <span style="color:#1e3858"> › </span>');
}

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(){
  simStep(dist);
  camX+=(phys[focused].x-camX)*0.07;
  camY+=(phys[focused].y-camY)*0.07;
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── NAVIGATION ────────────────────────────────────────────
function goTo(id){
  if(!NM[id]||id===focused) return;
  history.push(focused);
  focused=id;
  dist=bfsDist(focused);
}
function goBack(){
  if(!history.length) return;
  focused=history.pop();
  dist=bfsDist(focused);
}
function navDir(angle){
  const cp=phys[focused];
  let best=null,bestScore=-Infinity;
  ADJ[focused].forEach(id=>{
    const p=phys[id];
    const a=Math.atan2(p.y-cp.y,p.x-cp.x);
    const score=Math.cos(a-angle);
    if(score>bestScore){bestScore=score;best=id;}
  });
  if(best) goTo(best);
}

// ── INPUT ─────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  const prevent=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Backspace','PageUp','PageDown','Home'];
  if(prevent.includes(e.key)) e.preventDefault();
  if(e.key==='ArrowRight') navDir(0);
  if(e.key==='ArrowDown')  navDir(Math.PI/2);
  if(e.key==='ArrowLeft')  navDir(Math.PI);
  if(e.key==='ArrowUp')    navDir(-Math.PI/2);
  if(e.key==='Backspace')  goBack();
  if(e.key==='PageUp')   { zoom=Math.min(8,zoom*1.2); }
  if(e.key==='PageDown') { zoom=Math.max(.03,zoom/1.2); }
  if(e.key==='Home')     { panOffX=0;panOffY=0;zoom=1; }
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom=Math.max(.03,Math.min(8,zoom*(e.deltaY<0?1.1:.9)));
},{passive:false});

let drag=false,ds={x:0,y:0},lp={x:0,y:0};
canvas.addEventListener('mousedown',e=>{drag=true;ds={x:e.clientX,y:e.clientY};lp={x:panOffX,y:panOffY};});
canvas.addEventListener('mousemove',e=>{if(drag){panOffX=lp.x+e.clientX-ds.x;panOffY=lp.y+e.clientY-ds.y;}});
canvas.addEventListener('mouseup',e=>{
  const moved=Math.hypot(e.clientX-ds.x,e.clientY-ds.y);
  drag=false;
  if(moved<5){
    let best=null,bd=Infinity;
    DATA.nodes.forEach(n=>{
      if((dist[n.id]??99)>=3||zoomAlpha(n.level,zoom)<=0) return;
      const [sx,sy]=w2s(phys[n.id].x,phys[n.id].y);
      const baseR=(BASE_R[n.level]||50)*orbScale;
      const r=baseR*zoomAlpha(n.level,zoom);
      const dd=Math.hypot(e.clientX-sx,e.clientY-sy);
      if(dd<r+8&&dd<bd){best=n.id;bd=dd;}
    });
    if(best&&best!==focused) goTo(best);
  }
});
canvas.addEventListener('mouseleave',()=>{drag=false;});

// ── BRIGHTNESS / CONTRAST / ORB SIZE ──────────────────────
const bSlider=document.getElementById('bslider');
const cSlider=document.getElementById('cslider');
const oSlider=document.getElementById('oslider');
function applyVfx(){
  canvas.style.filter=`brightness(${bSlider.value}%) contrast(${cSlider.value}%)`;
  document.getElementById('bval').textContent=bSlider.value+'%';
  document.getElementById('cval').textContent=cSlider.value+'%';
  orbScale=oSlider.value/100;
  document.getElementById('oval').textContent=oSlider.value+'%';
}
bSlider.addEventListener('input',applyVfx);
cSlider.addEventListener('input',applyVfx);
oSlider.addEventListener('input',applyVfx);
</script>
